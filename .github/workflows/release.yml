name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Re-run tag + release + dispatch (e.g. v1.0.1)
        required: true
        type: string
      version:
        description: Plugin version without v prefix (optional; derived from tag)
        required: false
        type: string

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'WeZZard/skill-kit'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.SKILL_KIT_RELEASE_TOKEN }}

      - name: Detect version bump
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="${TAG#v}"
            fi
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          PREVIOUS=$(git show HEAD~1:.claude-plugin/plugin.json 2>/dev/null | jq -r '.version' || echo "")
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "tag=v${CURRENT}" >> "$GITHUB_OUTPUT"

      - name: Validate plugin
        if: steps.meta.outputs.skip != 'true'
        run: npx --yes @anthropic-ai/claude-code@latest plugin validate .

      - name: Create tag and release
        if: steps.meta.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.SKILL_KIT_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          if git ls-remote --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on remote — skipping tag push"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Skill Kit $VERSION" --generate-notes

      - name: Dispatch catalog sync
        if: steps.meta.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.SKILL_KIT_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          RELEASE_SHA=$(git ls-remote origin "refs/tags/${TAG}^{}" | awk 'NR==1 {print $1}')
          if [ -z "$RELEASE_SHA" ]; then
            RELEASE_SHA=$(git ls-remote origin "refs/tags/${TAG}" | awk 'NR==1 {print $1}')
          fi
          if [ -z "$RELEASE_SHA" ]; then
            RELEASE_SHA="${{ github.sha }}"
          fi
          RELEASE_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          gh api repos/WeZZard/skills/dispatches \
            -f event_type=sync-plugin \
            -f "client_payload[release_id]=$RELEASE_ID" \
            -f "client_payload[plugin]=skill-kit" \
            -f "client_payload[version]=${{ steps.meta.outputs.version }}" \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[sha]=${RELEASE_SHA}" \
            -f "client_payload[repo]=WeZZard/skill-kit"
          echo "Dispatched sync-plugin release_id=$RELEASE_ID sha=$RELEASE_SHA"
