name: Propose Release

on:
  workflow_dispatch:

concurrency:
  group: propose-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  propose:
    if: github.repository == 'WeZZard/skill-kit'
    uses: WeZZard/workflows/.github/workflows/propose-release.yml@v1.0.0
    with:
      version_file: .claude-plugin/plugin.json
    secrets:
      RELEASE_TOKEN: ${{ secrets.SKILL_KIT_RELEASE_TOKEN }}
